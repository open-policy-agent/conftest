version: 2

before:
  hooks:
  - go mod download

builds:
- id: conftest
  main: ./main.go
  env:
  - CGO_ENABLED=0
  goos:
  - windows
  - linux
  - darwin
  goarch:
  - amd64
  - arm64
  - ppc64le
  - s390x
  ldflags:
  - "-s"
  - "-w"
  - "-X github.com/open-policy-agent/conftest/internal/version.Version={{.Version}}"

archives:
- ids: [conftest]
  name_template: >-
    {{ .ProjectName }}_
    {{- .Version }}_
    {{- if eq .Os "linux" }}Linux
    {{- else if eq .Os "windows" }}Windows
    {{- else if eq .Os "darwin" }}Darwin
    {{- else }}{{ .Os }}{{ end }}_
    {{- if eq .Arch "386" }}i386
    {{- else if eq .Arch "amd64" }}x86_64
    {{- else }}{{ .Arch }}{{ end }}
  formats: [tar.gz]
  format_overrides:
  - goos: windows
    formats: [zip]
  files:
      - LICENSE
      - README.md
      - plugin/*.sh

checksum:
  name_template: 'checksums.txt'

changelog:
  use: github
  groups:
  - title: New Features
    regexp: '^.*?feat(ure)?(\([[:word:]]+\))??!?:.+$'
    order: 0
  - title: Bug Fixes
    regexp: '^.*?(bug|fix)(\([[:word:]]+\))??!?:.+$'
    order: 1
  - title: OPA Changes
    regexp: '(?i)bump (opa|github.com/open-policy-agent/opa)'
    order: 5
  - title: Documentation Updates
    regexp: '^.*?(docs|documentation)(\([[:word:]]+\))??!?:.+$'
    order: 10
  - title: Other Changes
    order: 999
  sort: asc
  filters:
    exclude:
    - '^.*?test(\([[:word:]]+\))??!?:.+$'
    - '^.*?misc(\([[:word:]]+\))??!?:.+$'
    - '^.*?typo(\([[:word:]]+\))??!?:.+$'
    - '(?i) typo( |\.|\r?\n)'

# Publishes the deb and rpm files to the GitHub releases page.
nfpms:
  - ids: [conftest]
    file_name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- if eq .Os "linux" }}Linux
      {{- else if eq .Os "windows" }}Windows
      {{- else if eq .Os "darwin" }}Darwin
      {{- else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "386" }}i386
      {{- else if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    bindir: /usr/bin
    description: "Test your configuration using Open Policy Agent"
    formats:
      - deb
      - rpm
    homepage: https://github.com/open-policy-agent/conftest
    maintainer: jpreese <john@reese.dev>
    license: Apache-2.0
