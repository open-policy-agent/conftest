name: tag

on:
  push:
    tags:
      - 'v*'
env:
  IMAGE: openpolicyagent/conftest
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v5

      # It is important to check the GoReleaser config before pushing to
      # Dockerhub to avoid having mismatches between what is in Dockerhub
      # and GitHub releases.
      - name: check releaser config
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # ratchet:goreleaser/goreleaser-action@v7.2.3
        with:
          args: check
          version: "~> v2"

  docker-conftest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs:
      - check
    steps:
      - name: checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v5

      - name: login to docker hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # ratchet:docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_LOGIN }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: get version
        id: get-version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: setup docker buildx
        run: docker buildx create --name conftestbuild --use

      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # ratchet:docker/build-push-action@v7.2.0
        with:
          context: .
          push: true
          build-args: |
            VERSION=${{ steps.get-version.outputs.VERSION }}
          tags: |
            ${{ env.IMAGE }}:${{ steps.get-version.outputs.VERSION }}
            ${{ env.IMAGE }}:latest
          platforms: ${{ env.PLATFORMS }}

  docker-examples:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs:
      - check
    steps:
      - name: checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v5

      - name: login to docker hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # ratchet:docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_LOGIN }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: setup docker buildx
        run: docker buildx create --name conftestbuild --use

      - name: Build and push examples image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # ratchet:docker/build-push-action@v7.2.0
        with:
          context: .
          push: true
          target: examples
          tags: ${{ env.IMAGE }}:examples
          platforms: ${{ env.PLATFORMS }}

  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write # GoReleaser creates the GitHub release
    needs:
      - docker-conftest
      - docker-examples
    steps:
      - name: checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v5
        with:
          fetch-depth: 0 # Need to fetch the full history for the GoReleaser changelog.

      - name: setup go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # ratchet:actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: false

      - name: release
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # ratchet:goreleaser/goreleaser-action@v7.2.3
        with:
          args: release --clean
          version: "~> v2"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
