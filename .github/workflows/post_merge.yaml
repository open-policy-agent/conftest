name: 'post_merge'
on:
  push:
    branches:
      - 'master'

permissions: {}

jobs:
  docker-conftest:
    runs-on: ubuntu-latest
    env:
      IMAGE: openpolicyagent/conftest
      PLATFORMS: linux/amd64,linux/arm64
    steps:
      - name: checkout source
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # ratchet:actions/checkout@v5

      - name: setup docker buildx
        run: docker buildx create --name conftestbuild --use

      - name: Build Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # ratchet:docker/build-push-action@v7.0.0
        with:
          context: '.'
          push: false
          # The foo tag below validates putting one tag per line (like we do in the release flow)
          # works as expected.
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:foo
          platforms: ${{ env.PLATFORMS }}

  docker-examples:
    runs-on: ubuntu-latest
    env:
      IMAGE: openpolicyagent/conftest
      PLATFORMS: linux/amd64,linux/arm64
    steps:
      - name: checkout source
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # ratchet:actions/checkout@v5

      - name: setup docker buildx
        run: docker buildx create --name conftestbuild --use

      - name: Build Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # ratchet:docker/build-push-action@v7.0.0
        with:
          context: '.'
          target: examples
          push: false
          tags: ${{ env.IMAGE }}:examples
          platforms: ${{ env.PLATFORMS }}
