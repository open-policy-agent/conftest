name: 'docker-test'
on:
  pull_request:

env:
  BUILD_ARITFACTS_NAME: 'conftest_build'

jobs:
  build:
    runs-on: 'ubuntu-latest'
    strategy:
      matrix:
        goarch: ['amd64', 'arm64']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: get version
        id: get-version
        run: echo "VERSION=$(git describe --abbrev=4 --dirty --always --tags)" >> $GITHUB_OUTPUT
      - name: Build
        env:
          GOOS: 'linux'
          GOARCH: '${{ matrix.goarch }}'
        run: make build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: '${{ env.BUILD_ARITFACTS_NAME }}-${{ matrix.goarch }}'
          path: conftest
